name: docker-build-push-scan

on:
  workflow_call:
    inputs:
      runs-on:
        type: string
        required: false
        default: "ubuntu-24.04"
      WORKING_DIR:
        type: string
        required: false
        default: "."
      DOCKERFILE_NAME:
        type: string
        required: false
        default: Dockerfile
      IMAGE_NAME:
        type: string
        required: true
      IMAGE_TAG_PREFIX:
        type: string
        required: false
        default: ""
      push:
        type: boolean
        required: false
        default: false
      image-tags:
        type: string
        required: false
        default: ""
      tag-commithash:
        type: boolean
        required: false
        default: false
      tag-monthly:
        type: boolean
        required: false
        default: false
      tag-daily:
        type: boolean
        required: false
        default: false
      tag-secondly:
        type: boolean
        required: false
        default: false
      scan:
        type: boolean
        required: false
        default: false
    secrets:
      DOCKER_HUB_USERNAME:
        required: true
      DOCKER_HUB_PASSWORD:
        required: true
      DISCORD_WEBHOOK:
        required: false
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
env:
  IMAGE_TAGS: "${{ inputs.image-tags }}"
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build-push-scan:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: buildx
        uses: docker/setup-buildx-action@v3
      - name: env
        run: |
          echo "run_name=${{ github.workflow }}" >> $GITHUB_ENV
          echo "run_url=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> $GITHUB_ENV
          echo "FULL_COMMIT_HASH=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "SHORT_COMMIT_HASH=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_ENV"
          echo "TAG_MONTHLY=$(date +"%Y.%m")" >> $GITHUB_ENV
          echo "TAG_DAILY=$(date +"%Y.%m.%d")" >> $GITHUB_ENV
          echo "TAG_SECONDLY=$(date +"%Y.%m.%d.%H%M%S")" >> $GITHUB_ENV
          cat $GITHUB_ENV

      - name: tag-latest
        run: |
          echo IMAGE_TAGS=${{ inputs.IMAGE_NAME }}:${{ inputs.IMAGE_TAG_PREFIX }}latest >> $GITHUB_ENV

      - name: tag-commithash
        if: "${{ inputs.tag-commithash }}"
        run: |
          echo IMAGE_TAGS="$IMAGE_TAGS,${{ inputs.IMAGE_NAME }}:${{ inputs.IMAGE_TAG_PREFIX }}git-$FULL_COMMIT_HASH,${{ inputs.IMAGE_NAME }}:git-$SHORT_COMMIT_HASH" >> $GITHUB_ENV

      - name: tag-monthly
        if: "${{ inputs.tag-monthly }}"
        run: |
          echo IMAGE_TAGS="$IMAGE_TAGS,${{ inputs.IMAGE_NAME }}:${{ inputs.IMAGE_TAG_PREFIX }}$TAG_MONTHLY" >> $GITHUB_ENV

      - name: tag-daily
        if: "${{ inputs.tag-daily }}"
        run: |
          echo IMAGE_TAGS="$IMAGE_TAGS,${{ inputs.IMAGE_NAME }}:${{ inputs.IMAGE_TAG_PREFIX }}$TAG_DAILY" >> $GITHUB_ENV

      - name: tag-secondly
        if: "${{ inputs.tag-secondly }}"
        run: |
          echo IMAGE_TAGS="$IMAGE_TAGS,${{ inputs.IMAGE_NAME }}:${{ inputs.IMAGE_TAG_PREFIX }}$TAG_SECONDLY" >> $GITHUB_ENV

      - name: login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: docker-build-push
        uses: docker/build-push-action@v6
        with:
          context: "${{ inputs.WORKING_DIR }}"
          file: "${{ inputs.WORKING_DIR }}/${{ inputs.DOCKERFILE_NAME }}"
          push: "${{ inputs.push }}"
          tags: ${{ env.IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: snyk/actions/setup@master
        if: "${{ inputs.scan }}"

      - name: snyk container test
        if: "${{ inputs.scan }}"
        run: snyk container test --severity-threshold=high ${{ inputs.IMAGE_NAME }}:${{ inputs.IMAGE_TAG_PREFIX }}$TAG_MONTHLY
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - id: ruok
        run: echo 'ruok=yes' >> $GITHUB_ENV

      - id: finally
        name: finally
        if: ${{ always() }}
        run: |
          case "$ruok" in
            "yes") status="ok" ;;
            *) status="fuck" ;;
          esac

          export NOTI_MSG="$status $run_name ${{ env.IMAGE_TAGS }} $run_url" > $GITHUB_ENV

          if [[ ! -z "$DISCORD_WEBHOOK" ]]; then
            curl -X POST "${{ env.DISCORD_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d "{\"content\":\"${NOTI_MSG}\"}"
          fi

          if [[ ! -z "$TELEGRAM_BOT_TOKEN" ]]; then
            curl -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="${NOTI_MSG}"
          fi
